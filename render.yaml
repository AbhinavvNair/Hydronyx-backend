services:
  - type: web
    name: hydronyx-backend
    runtime: python
    buildCommand: "pip install --upgrade pip && pip install geopandas && pip install -r requirements.txt"
    startCommand: "uvicorn backend.app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: ALLOWED_ORIGINS
        value: "https://hydroai-pi.vercel.app,http://localhost:3000"
      - key: ALLOWED_ORIGIN_PATTERNS
        value: "https://hydroai-.*\\.vercel\\.app"
      - key: COOKIE_SECURE
        value: "true"
      - key: RATE_LIMIT_MAX_PER_WINDOW
        value: "120"
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      - key: REQUEST_TIMEOUT_SECONDS
        value: "60"
      # Set these as secret env vars in the Render dashboard — do NOT hardcode here:
      # MONGODB_URL
      # DATABASE_NAME
      # SECRET_KEY
